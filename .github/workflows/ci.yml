name: "CI"
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [ 16, 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage
